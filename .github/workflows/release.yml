name: Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg-dev fakeroot gnome-shell zip npm

      - name: Build and test
        run: |
          make clean
          make test
          make test-deb-install
          make package-snap
          make package-gnome-extension
          make package-vscode-extension

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unix-utility-suite-artifacts
          path: |
            dist/*.deb
            dist/*.snap
            dist/*.zip
            dist/*.vsix
