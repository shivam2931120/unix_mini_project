id: io.github.shivam2931120.UnixToolkitLauncher
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: unix-toolkit-flatpak
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --talk-name=org.freedesktop.Flatpak
modules:
  - name: unix-toolkit-flatpak-launcher
    buildsystem: simple
    build-commands:
      - install -Dm755 unix-toolkit-flatpak-wrapper.sh /app/bin/unix-toolkit-flatpak
      - install -Dm644 io.github.shivam2931120.UnixToolkitLauncher.desktop /app/share/applications/io.github.shivam2931120.UnixToolkitLauncher.desktop
      - install -Dm644 io.github.shivam2931120.UnixToolkitLauncher.metainfo.xml /app/share/metainfo/io.github.shivam2931120.UnixToolkitLauncher.metainfo.xml
      - install -Dm644 io.github.shivam2931120.UnixToolkitLauncher.svg /app/share/icons/hicolor/scalable/apps/io.github.shivam2931120.UnixToolkitLauncher.svg
    sources:
      - type: file
        path: unix-toolkit-flatpak-wrapper.sh
      - type: file
        path: io.github.shivam2931120.UnixToolkitLauncher.desktop
      - type: file
        path: io.github.shivam2931120.UnixToolkitLauncher.metainfo.xml
      - type: file
        path: io.github.shivam2931120.UnixToolkitLauncher.svg
